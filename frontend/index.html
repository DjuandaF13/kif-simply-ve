<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Simply-Ve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%); 
            height: 100vh; 
            overflow: hidden;
        }
        .login-card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e0e0e0; }
        .form-control:focus { box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); border-color: #0d6efd; }
        .btn-login { border-radius: 10px; padding: 12px; font-weight: 600; letter-spacing: 0.5px; }
        .logo-placeholder { width: 70px; height: 70px; background: #e9ecef; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: #0d6efd; font-size: 24px; font-weight: bold;}
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="card login-card" style="width: 100%; max-width: 380px; margin: 20px;">
        <div class="card-body p-4 p-md-5">
            <div class="logo-placeholder">🚙</div>
            <h3 class="text-center fw-bold mb-1" style="color: #2b3452;">Simply-Ve</h3>
            <p class="text-center text-muted small mb-4">Sistem Pengajuan Kendaraan PT Nusira</p>
            
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-4">
                    <label for="nik" class="form-label small fw-semibold text-muted">Nomor Induk Karyawan (NIK)</label>
                    <input type="text" class="form-control" id="nik" placeholder="Masukkan NIK Anda..." autocomplete="off" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-login shadow-sm" id="btnLogin">Masuk Aplikasi</button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            const nikInput = document.getElementById('nik').value;
            const btnLogin = document.getElementById('btnLogin');
            const alertBox = document.getElementById('alertBox');
            
            btnLogin.innerText = "Memproses..."; btnLogin.disabled = true; alertBox.classList.add('d-none'); 

            try {
                // MENGGUNAKAN API_URL DARI CONFIG.JS
                const response = await fetch(API_URL + '/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nik: nikInput })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user_nik', data.nik); localStorage.setItem('user_nama', data.nama); localStorage.setItem('user_role', data.role);
                    window.location.href = (data.role === 'security') ? "security.html" : "dashboard.html"; 
                } else {
                    alertBox.innerText = data.detail; alertBox.classList.remove('d-none'); 
                }
            } catch (error) {
                alertBox.innerText = "Tidak dapat terhubung ke server backend."; alertBox.classList.remove('d-none');
            } finally { btnLogin.innerText = "Masuk Aplikasi"; btnLogin.disabled = false; }
        });
    </script>
</body>
</html>
