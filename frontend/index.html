<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Simply-Ve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Simply-Ve</h3>
            <p class="text-center text-muted">Sistem Pengajuan Kendaraan</p>
            
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="nik" class="form-label">Nomor Induk Karyawan (NIK)</label>
                    <input type="text" class="form-control" id="nik" placeholder="Contoh: 1111" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="btnLogin">Masuk</button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Menangkap elemen dari HTML agar bisa dimanipulasi oleh JavaScript
        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const btnLogin = document.getElementById('btnLogin');

        // Menambahkan event pendengar saat form disubmit (tombol masuk ditekan)
        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault(); // Mencegah halaman refresh secara otomatis

            // Mengambil nilai NIK yang diketik oleh pengguna
            const nikValue = document.getElementById('nik').value;
            
            // Mengubah teks tombol agar pengguna tahu sistem sedang memproses
            btnLogin.innerText = "Memproses...";
            btnLogin.disabled = true;
            alertBox.classList.add('d-none'); // Menyembunyikan pesan error sebelumnya (jika ada)

            try {
                // Mengirim permintaan POST ke Backend FastAPI
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nik: nikValue }) // Membungkus NIK ke dalam format JSON
                });

                const data = await response.json();

                if (response.ok) {
                    // JIKA LOGIN SUKSES
                    // Menyimpan data user ke memori browser agar dikenali di halaman Dashboard dan Cetak
                    localStorage.setItem('user_nik', nikValue);
                    localStorage.setItem('user_nama', data.nama);
                    localStorage.setItem('user_role', data.role);

                    // ==========================================
                    // PERBAIKAN: LOGIKA PERUTEAN CERDAS (AUTO-REDIRECT)
                    // ==========================================
                    if (data.role === 'security') {
                        // Jika yang login Satpam, arahkan ke portal pos keamanan
                        window.location.href = "security.html"; 
                    } else {
                        // Jika yang login Karyawan, GA, atau Manager, arahkan ke dasbor utama
                        window.location.href = "dashboard.html"; 
                    }
                    
                } else {
                    // JIKA LOGIN GAGAL (Contoh: NIK tidak terdaftar)
                    alertBox.innerText = data.detail;
                    alertBox.classList.remove('d-none'); // Memunculkan kotak merah berisi pesan error
                }
            } catch (error) {
                // JIKA SERVER MATI ATAU ADA GANGGUAN JARINGAN
                alertBox.innerText = "Tidak dapat terhubung ke server. Pastikan server backend FastAPI menyala.";
                alertBox.classList.remove('d-none');
            } finally {
                // Mengembalikan keadaan tombol seperti semula jika gagal login
                btnLogin.innerText = "Masuk";
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
